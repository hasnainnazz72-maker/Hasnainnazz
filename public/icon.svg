<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="50%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    
    <!-- Neon Accent Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Metallic Groove Gradient -->
    <radialGradient id="grooveGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111827" stop-opacity="0" />
      <stop offset="40%" stop-color="#10b981" stop-opacity="0.1" />
      <stop offset="70%" stop-color="#000000" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.2" />
    </radialGradient>
  </defs>

  <!-- Maskable Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Vinyl Rim -->
  <circle cx="256" cy="256" r="210" fill="#09090b" stroke="url(#neonGrad)" stroke-width="4" />
  
  <!-- Vinyl Groove Lines -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#1f2937" stroke-width="2" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="#111827" stroke-width="1.5" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="#374151" stroke-width="1" />
  <circle cx="256" cy="256" r="130" fill="none" stroke="#111827" stroke-width="1.5" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="#4b5563" stroke-width="1" />

  <!-- Shiny Reflection Overlay -->
  <circle cx="256" cy="256" r="210" fill="url(#grooveGrad)" />

  <!-- Record Label Center -->
  <circle cx="256" cy="256" r="80" fill="#022c22" stroke="#10b981" stroke-width="3" />
  <circle cx="256" cy="256" r="72" fill="#064e3b" />

  <!-- Music Note / Star Logo -->
  <g transform="translate(226, 216) scale(1.1)">
    <!-- Sleek Note Design -->
    <path d="M45,10 L45,45 C45,51 40,55 33,55 C26,55 21,51 21,45 C21,39 26,35 33,35 C36,35 39,36 41,38 L41,20 L13,26 L13,51 C13,57 8,61 1,61 C-6,61 -11,57 -11,51 C-11,45 -6,41 1,41 C4,41 7,42 9,44 L9,14 L45,10 Z" fill="#10b981" />
    <path d="M45,10 L45,20 L13,26 L13,16 L45,10 Z" fill="#34d399" />
  </g>

  <!-- Glowing Center Pin -->
  <circle cx="256" cy="256" r="12" fill="#10b981" />
  <circle cx="256" cy="256" r="6" fill="#ffffff" />
</svg>
